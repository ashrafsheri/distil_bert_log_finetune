name: CI-GHCR

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - k8s/**
      - realtime_anomaly_detection/**
      - .github/workflows/ci.yml

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

# Touching this workflow intentionally forces all three service images to rebuild,
# because each paths-filter includes `.github/workflows/ci.yml`.

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Detect which service directories changed so we only build what's needed.
  # ──────────────────────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      anomaly:  ${{ steps.filter.outputs.anomaly }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2        # paths-filter needs at least 2 commits
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            anomaly:
              - 'realtime_anomaly_detection/**'
              - '.github/workflows/ci.yml'

  # ──────────────────────────────────────────────────────────────────────────
  # Per-service build jobs — each runs only when its paths changed.
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & Push Backend
        run: |
          docker buildx build \
            -t $GHCR_IMAGE_PREFIX/backend:${{ github.sha }} \
            -t $GHCR_IMAGE_PREFIX/backend:latest \
            --push backend

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & Push Frontend
        run: |
          docker buildx build \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
            --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }} \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }} \
            --build-arg VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }} \
            -t $GHCR_IMAGE_PREFIX/frontend:${{ github.sha }} \
            -t $GHCR_IMAGE_PREFIX/frontend:latest \
            --push frontend

  build-anomaly-detection:
    needs: detect-changes
    if: needs.detect-changes.outputs.anomaly == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & Push Anomaly Detection
        run: |
          docker buildx build \
            -t $GHCR_IMAGE_PREFIX/anomaly-detection:${{ github.sha }} \
            -t $GHCR_IMAGE_PREFIX/anomaly-detection:latest \
            --push realtime_anomaly_detection

  # ──────────────────────────────────────────────────────────────────────────
  # Publish a small JSON artifact recording what changed so the CD job can
  # decide which deployments to roll out.  Runs even if build jobs are
  # skipped; does NOT run if the workflow was cancelled.
  # ──────────────────────────────────────────────────────────────────────────
  write-build-matrix:
    needs: [detect-changes, build-backend, build-frontend, build-anomaly-detection]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Write build matrix JSON
        run: |
          cat > build-matrix.json << 'ENDJSON'
          {
            "backend": "${{ needs.detect-changes.outputs.backend }}",
            "frontend": "${{ needs.detect-changes.outputs.frontend }}",
            "anomaly":  "${{ needs.detect-changes.outputs.anomaly }}",
            "sha":      "${{ github.sha }}"
          }
          ENDJSON
      - uses: actions/upload-artifact@v4
        with:
          name: build-matrix
          path: build-matrix.json
          retention-days: 7
