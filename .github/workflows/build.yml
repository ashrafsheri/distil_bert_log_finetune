name: Build

# Trigger refresh: 2026-04-21

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - realtime_anomaly_detection/models/**
      - scripts/backtest_harness.py
      - .github/workflows/build.yml
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # required for better SonarQube analysis relevancy

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Run the full test suite.
      #
      # PYTHONPATH explanation:
      #   backend/                          — so `from app.*` imports resolve for
      #                                       all tests, including backtest_harness.py
      #                                       which is loaded via importlib at runtime.
      #   realtime_anomaly_detection/       — so multi-tenant detector tests can do
      #                                       `from models.* import ...` when torch is
      #                                       available.
      #
      # Tests that require torch call pytest.importorskip("torch") and are skipped
      # gracefully in this environment — that is intentional.
      - name: Run backend tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/realtime_anomaly_detection
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost/test_db"
        run: |
          pytest backend/tests \
            --cov=backend/app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
