name: CD - Deploy to K3s

on:
  workflow_run:
    workflows: ["CI-GHCR"]
    types:
      - completed

permissions:
  contents: read
  packages: read
  actions: read      # needed to download artifacts from the CI workflow run

env:
  GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ── 1. Download the build matrix written by CI ──────────────────────
      - name: Download build matrix
        uses: actions/download-artifact@v4
        with:
          name: build-matrix
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      # ── 2. Parse what was actually built ─────────────────────────────────
      - name: Parse build matrix
        id: matrix
        run: |
          BACKEND=$(jq -r '.backend' build-matrix.json)
          FRONTEND=$(jq -r '.frontend' build-matrix.json)
          ANOMALY=$(jq -r '.anomaly'  build-matrix.json)
          echo "backend=$BACKEND"  >> $GITHUB_OUTPUT
          echo "frontend=$FRONTEND" >> $GITHUB_OUTPUT
          echo "anomaly=$ANOMALY"   >> $GITHUB_OUTPUT
          echo "Built → backend=${BACKEND}  frontend=${FRONTEND}  anomaly=${ANOMALY}"

      # ── 3. Checkout repo (for k8s manifests) ─────────────────────────────
      - uses: actions/checkout@v4

      # ── 4. Deploy to k3s via SSH ──────────────────────────────────────────
      - name: Deploy to K3s Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            BACKEND_CHANGED=${{ steps.matrix.outputs.backend }}
            FRONTEND_CHANGED=${{ steps.matrix.outputs.frontend }}
            ANOMALY_CHANGED=${{ steps.matrix.outputs.anomaly }}
            COMMIT_SHA=${{ github.event.workflow_run.head_sha }}

            rollout_or_debug() {
              local deployment="$1"
              local timeout="$2"

              if ! sudo kubectl rollout status "deployment/${deployment}" -n logguard --timeout="${timeout}"; then
                echo "=== Rollout failed for ${deployment} ==="
                sudo kubectl get pods -n logguard -o wide
                sudo kubectl describe "deployment/${deployment}" -n logguard || true
                sudo kubectl describe pods -n logguard -l "app=${deployment}" || true
                sudo kubectl logs -n logguard "deployment/${deployment}" --tail=200 || true
                exit 1
              fi
            }

            # Navigate to project directory and pull latest manifests
            cd ${{ secrets.PROJECT_DIR || '~/distil_bert_log_finetune' }}
            git pull origin main

            # Ensure namespace exists
            sudo kubectl create namespace logguard 2>/dev/null || true

            # Refresh GHCR pull secret
            sudo kubectl delete secret ghcr-secret -n logguard 2>/dev/null || true
            sudo kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ secrets.GHCR_USERNAME }} \
              --docker-password=${{ secrets.GHCR_PAT }} \
              -n logguard

            # Refresh Firebase service account secret if present
            if [ -f backend/app/serviceAccountKey.json ]; then
              sudo kubectl delete secret firebase-secret -n logguard 2>/dev/null || true
              sudo kubectl create secret generic firebase-secret \
                --from-file=serviceAccountKey.json=backend/app/serviceAccountKey.json \
                -n logguard
            fi

            # Apply all k8s manifests (idempotent; cheap even when nothing changed)
            sudo kubectl apply -f k8s/namespace.yaml
            sudo kubectl apply -f k8s/postgres-secret.yaml
            sudo kubectl apply -f k8s/backend-secret.yaml
            sudo kubectl apply -f k8s/postgres-pvc.yaml
            sudo kubectl apply -f k8s/elasticsearch-pvc.yaml
            sudo kubectl apply -f k8s/model-artifacts-pvc.yaml
            sudo kubectl apply -f k8s/anomaly-state-pvc.yaml
            sudo kubectl apply -f k8s/postgres-deployment.yaml
            sudo kubectl apply -f k8s/postgres-service.yaml
            sudo kubectl apply -f k8s/elasticsearch-deployment.yaml
            sudo kubectl apply -f k8s/elasticsearch-service.yaml
            sudo kubectl apply -f k8s/backend-deployment.yaml
            sudo kubectl apply -f k8s/backend-service.yaml
            sudo kubectl apply -f k8s/anomaly-detection-deployment.yaml
            sudo kubectl apply -f k8s/anomaly-detection-service.yaml
            sudo kubectl apply -f k8s/frontend-deployment.yaml
            sudo kubectl apply -f k8s/frontend-service.yaml
            sudo kubectl apply -f k8s/ingress.yaml

            # Update images only for services that were rebuilt in this CI run
            if [ "$BACKEND_CHANGED" = "true" ]; then
              echo "→ Updating backend image to ${COMMIT_SHA}"
              sudo kubectl set image deployment/backend \
                backend=${{ env.GHCR_IMAGE_PREFIX }}/backend:${COMMIT_SHA} \
                -n logguard
            fi

            if [ "$FRONTEND_CHANGED" = "true" ]; then
              echo "→ Updating frontend image to ${COMMIT_SHA}"
              sudo kubectl set image deployment/frontend \
                frontend=${{ env.GHCR_IMAGE_PREFIX }}/frontend:${COMMIT_SHA} \
                -n logguard
            fi

            if [ "$ANOMALY_CHANGED" = "true" ]; then
              echo "→ Updating anomaly-detection image to ${COMMIT_SHA}"
              sudo kubectl set image deployment/anomaly-detection \
                anomaly-detection=${{ env.GHCR_IMAGE_PREFIX }}/anomaly-detection:${COMMIT_SHA} \
                -n logguard
            fi

            # Wait for infra rollouts (always — these are lightweight if unchanged)
            rollout_or_debug postgres       180s
            rollout_or_debug elasticsearch  300s

            # Wait for app rollouts only for services that were updated
            if [ "$BACKEND_CHANGED" = "true" ]; then
              rollout_or_debug backend 300s
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              rollout_or_debug frontend 180s
            fi
            if [ "$ANOMALY_CHANGED" = "true" ]; then
              rollout_or_debug anomaly-detection 300s
            fi

            echo "=== Deployment Status ==="
            sudo kubectl get pods     -n logguard
            sudo kubectl get services -n logguard
            sudo kubectl get ingress  -n logguard
