<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <marker id="a-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#F59E0B"/></marker>
    <marker id="a-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#38BDF8"/></marker>
    <marker id="a-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#A78BFA"/></marker>
    <marker id="a-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#22C55E"/></marker>
    <marker id="a-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#EF4444"/></marker>
    <marker id="a-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/></marker>
    <marker id="a-o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#FB923C"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#0D1117"/>
  <rect width="1600" height="3" fill="#F59E0B" opacity="0.7"/>

  <!-- ── HEADER ── -->
  <text x="800" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="700" fill="#E2E8F0">Student–Teacher Knowledge Distillation</text>
  <text x="800" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#475569">Shared teacher model distills into per-project students · Continuous online learning · Periodic teacher refresh</text>
  <line x1="60" y1="90" x2="1540" y2="90" stroke="#1E293B" stroke-width="1"/>

  <!-- ── TEACHER MODEL (top-center) ── -->
  <rect x="480" y="108" width="640" height="200" rx="12" fill="#1A0E05" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="800" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#FCD34D">Teacher Model  (Shared · Cross-Project)</text>
  <text x="800" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#475569">teacher_model.py · Persisted in storage_dir/teacher/</text>
  <line x1="500" y1="174" x2="1100" y2="174" stroke="#2D1F08" stroke-width="1"/>

  <!-- Teacher inner 2-col -->
  <text x="545" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#FCD34D">Architecture</text>
  <text x="545" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">TemplateTransformer (d=256, h=8, L=4)</text>
  <text x="545" y="231" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">+ RuleBasedDetector</text>
  <text x="545" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">+ IsolationForest (fitted)</text>
  <text x="545" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">+ EnsembleCalibrator</text>
  <text x="545" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400E">base model: base_model_dir/</text>

  <line x1="840" y1="178" x2="840" y2="298" stroke="#2D1F08" stroke-width="1"/>

  <text x="880" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#FCD34D">Responsibilities</text>
  <text x="880" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">● Warmup-phase detection (all new projects)</text>
  <text x="880" y="231" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">● Soft-label generation for KD training</text>
  <text x="880" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">● Runtime escalation when student unc. high</text>
  <text x="880" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#F59E0B">● Periodic refresh every 7 days from students</text>
  <text x="880" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400E">KD_TEMPERATURE = 3.0  (must match distillation)</text>

  <!-- ── KD PROCESS BOX (center bridge) ── -->
  <rect x="530" y="328" width="540" height="100" rx="10" fill="#130A2A" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="800" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#C4B5FD">Knowledge Distillation  (knowledge_distillation.py)</text>
  <line x1="550" y1="362" x2="1050" y2="362" stroke="#2D1B69" stroke-width="1"/>
  <text x="800" y="380" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Teacher generates soft labels (T=3.0) · Student minimises KL(soft) + CE(hard) · α=0.5</text>
  <text x="800" y="398" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">epochs=5 · batch=32 · lr=1e-4 · weight_decay=0.01 · early stopping patience=3</text>
  <text x="800" y="416" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">Triggered after warmup threshold reached · Training runs in background thread · ProjectPhase → TRAINING</text>

  <!-- Teacher→KD arrow -->
  <line x1="800" y1="310" x2="800" y2="326" stroke="#F59E0B" stroke-width="2" marker-end="url(#a-a)"/>
  <text x="810" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#F59E0B">soft labels</text>

  <!-- KD → students arrows -->
  <path d="M800,430 L800,448 L280,448 L280,468" stroke="#38BDF8" stroke-width="1.5" fill="none" marker-end="url(#a-c)"/>
  <path d="M800,430 L800,448 L600,448 L600,468" stroke="#38BDF8" stroke-width="1.5" fill="none" marker-end="url(#a-c)"/>
  <path d="M800,430 L800,468" stroke="#38BDF8" stroke-width="1.5" fill="none" marker-end="url(#a-c)"/>
  <path d="M800,430 L800,448 L1000,448 L1000,468" stroke="#38BDF8" stroke-width="1.5" fill="none" marker-end="url(#a-c)"/>
  <path d="M800,430 L800,448 L1320,448 L1320,468" stroke="#38BDF8" stroke-width="1.5" fill="none" marker-end="url(#a-c)"/>
  <text x="804" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#38BDF8">distilled weights</text>

  <!-- ── STUDENT MODELS (bottom row) ── -->
  <!-- Student A -->
  <rect x="90" y="470" width="250" height="280" rx="10" fill="#051828" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="215" y="496" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7DD3FC">Student — Project A</text>
  <text x="215" y="514" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">student_model.py</text>
  <line x1="110" y1="522" x2="320" y2="522" stroke="#082030" stroke-width="1"/>
  <text x="110" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Phase: ACTIVE</text>
  <text x="110" y="558" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Vocab: project-specific</text>
  <text x="110" y="576" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">clean_normal_reservoir</text>
  <text x="110" y="594" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">IsolationForest (fitted)</text>
  <text x="110" y="612" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">EnsembleCalibrator</text>
  <line x1="110" y1="624" x2="320" y2="624" stroke="#082030" stroke-width="1"/>
  <text x="215" y="642" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#38BDF8">Online Learning</text>
  <text x="110" y="660" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">Every 500 logs</text>
  <text x="110" y="676" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">Fine-tune on reservoir</text>
  <text x="110" y="692" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">KL safety guard</text>
  <text x="110" y="708" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#F87171">Rollback if drift &gt; δ</text>
  <text x="110" y="726" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">ONLINE_UPDATE_INTERVAL</text>
  <text x="110" y="740" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">= 500 logs (default)</text>

  <!-- Student B -->
  <rect x="475" y="470" width="250" height="280" rx="10" fill="#051828" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="600" y="496" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7DD3FC">Student — Project B</text>
  <text x="600" y="514" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">student_model.py</text>
  <line x1="495" y1="522" x2="705" y2="522" stroke="#082030" stroke-width="1"/>
  <text x="495" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Phase: ACTIVE</text>
  <text x="495" y="558" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Vocab: project-specific</text>
  <text x="495" y="576" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">clean_normal_reservoir</text>
  <text x="495" y="594" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">IsolationForest (fitted)</text>
  <text x="495" y="612" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">EnsembleCalibrator</text>
  <line x1="495" y1="624" x2="705" y2="624" stroke="#082030" stroke-width="1"/>
  <text x="600" y="642" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#38BDF8">Online Learning</text>
  <text x="495" y="660" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">Every 500 logs</text>
  <text x="495" y="676" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">Fine-tune on reservoir</text>
  <text x="495" y="692" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">KL safety guard</text>
  <text x="495" y="708" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#F87171">Rollback if drift &gt; δ</text>
  <text x="495" y="726" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">Traffic profile shapes</text>
  <text x="495" y="740" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">thresholds &amp; min reqs</text>

  <!-- Student C (WARMUP/TRAINING) -->
  <rect x="860" y="470" width="250" height="280" rx="10" fill="#0A1F00" stroke="#22C55E" stroke-width="1.5"/>
  <text x="985" y="496" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#86EFAC">Student — Project C</text>
  <text x="985" y="514" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">(WARMUP phase)</text>
  <line x1="880" y1="522" x2="1090" y2="522" stroke="#0A2800" stroke-width="1"/>
  <text x="880" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Phase: WARMUP</text>
  <text x="880" y="558" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Using teacher detection</text>
  <text x="880" y="576" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Collecting clean logs</text>
  <text x="880" y="594" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Building reservoir</text>
  <text x="880" y="612" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#475569">Tracking template dist.</text>
  <line x1="880" y1="624" x2="1090" y2="624" stroke="#0A2800" stroke-width="1"/>
  <text x="985" y="645" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#22C55E">Warmup Criteria</text>
  <text x="880" y="663" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">standard: 10k logs</text>
  <text x="880" y="679" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">low_traffic: 1k logs</text>
  <text x="880" y="695" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">min_observed_hours: 6h</text>
  <text x="880" y="711" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">min_distinct_templates</text>
  <text x="880" y="727" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">max_single_template ≤0.85</text>
  <text x="880" y="743" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">parse_failure_rate ≤5%</text>

  <!-- Student N (placeholder) -->
  <rect x="1245" y="470" width="250" height="280" rx="10" fill="#111827" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1370" y="496" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#64748B">Student — Project N</text>
  <text x="1370" y="514" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">…scales to any project count…</text>
  <text x="1265" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">Each project gets its own</text>
  <text x="1265" y="568" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">StudentModel instance,</text>
  <text x="1265" y="586" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">isolated vocabulary,</text>
  <text x="1265" y="604" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">separate IsolationForest,</text>
  <text x="1265" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">and per-project calibration</text>
  <text x="1265" y="640" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#334155">threshold.</text>
  <text x="1265" y="680" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">students: Dict[str, StudentModel]</text>
  <text x="1265" y="696" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">(project_id → StudentModel)</text>

  <!-- ── TEACHER REFRESH arrows (from students back up to teacher) ── -->
  <!-- Curved return arrows from Student A and B up to Teacher -->
  <path d="M215,468 C215,440 400,400 480,350" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#a-a)" stroke-dasharray="5,3" opacity="0.7"/>
  <path d="M600,468 C600,440 660,400 680,350" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#a-a)" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Teacher refresh label -->
  <rect x="140" y="395" width="270" height="44" rx="6" fill="#1A0D05" stroke="#92400E" stroke-width="1"/>
  <text x="275" y="413" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#F59E0B">Teacher Refresh  (every 7 days)</text>
  <text x="275" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#92400E">Aggregated clean_normal_reservoir from all students</text>

  <!-- ── ESCALATION BOX (right side) ── -->
  <rect x="1360" y="328" width="220" height="118" rx="8" fill="#1A0A0A" stroke="#EF4444" stroke-width="1.5"/>
  <text x="1470" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FCA5A5">Teacher Escalation</text>
  <text x="1380" y="372" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">Triggered at runtime when:</text>
  <text x="1380" y="388" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#EF4444">unknown_template_ratio &gt; 50%</text>
  <text x="1380" y="404" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#EF4444">active_ensemble_models &lt; min</text>
  <text x="1380" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">Student defers to teacher</text>
  <text x="1380" y="436" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748B">for second-opinion score</text>

  <!-- Escalation arrow from teacher to box -->
  <line x1="1122" y1="208" x2="1358" y2="365" stroke="#EF4444" stroke-width="1.5" fill="none" marker-end="url(#a-r)" stroke-dasharray="4,3"/>

  <!-- ── FOOTER ── -->
  <line x1="60" y1="892" x2="1540" y2="892" stroke="#1E293B" stroke-width="1"/>
  <text x="800" y="884" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#334155">LogGuard · knowledge_distillation.py · teacher_model.py · student_model.py · project_manager.py · multi_tenant_detector.py</text>
</svg>
