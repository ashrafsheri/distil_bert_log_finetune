apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detection
  namespace: logguard
  labels:
    app: anomaly-detection
    app.kubernetes.io/part-of: logguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detection
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: anomaly-detection
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: anomaly-detection
          image: ghcr.io/ashrafsheri/anomaly-detection:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MODEL_DIR
              value: /app/artifacts/ensemble_model_export
            - name: ADAPTIVE_STATE_DIR
              value: /app/logs/adaptive_state
            - name: STORAGE_DIR
              value: /app/data/multi_tenant
            - name: LOG_LEVEL
              value: INFO
            - name: ANOMALY_SERVICE_PORT
              value: "8001"
            # ── Low-traffic profile tuning ──────────────────────────────────
            # Lower thresholds for projects created with traffic_profile=low_traffic.
            # Remove or increase these values to tighten gates in production.
            - name: MULTI_TENANT_LOW_TRAFFIC_WARMUP_THRESHOLD
              value: "200"
            - name: MULTI_TENANT_LOW_TRAFFIC_MIN_OBSERVED_HOURS
              value: "1"
            - name: MULTI_TENANT_LOW_TRAFFIC_MIN_CALIBRATION_SAMPLES
              value: "10"
            - name: MULTI_TENANT_LOW_TRAFFIC_MIN_TRAINING_SEQUENCES
              value: "20"
            - name: MULTI_TENANT_LOW_TRAFFIC_MIN_IF_FEATURE_ROWS
              value: "30"
            - name: MULTI_TENANT_LOW_TRAFFIC_MIN_DISTINCT_TEMPLATES
              value: "3"
            - name: MULTI_TENANT_LOW_TRAFFIC_MAX_TEMPLATE_RATIO
              value: "0.97"
            - name: MULTI_TENANT_MAX_DAILY_THRESHOLD_DELTA
              value: "0.3"
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/artifacts/ensemble_model_export
              readOnly: true
            - name: anomaly-state
              mountPath: /app/logs
            - name: anomaly-state
              mountPath: /app/data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
              ephemeral-storage: 2Gi
          # startupProbe gates readiness/liveness until the service is up.
          # failureThreshold * periodSeconds = max startup budget.
          # 30 * 10s = 300s — enough for cold PVC reads + model loading.
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: model-artifacts-pvc
        - name: anomaly-state
          persistentVolumeClaim:
            claimName: anomaly-state-pvc
